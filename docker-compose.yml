services:
  db:
    image: postgres:16
    container_name: legal_digest_db
    environment:
      POSTGRES_DB: legal_digest
      POSTGRES_USER: legal_digest
      POSTGRES_PASSWORD: legal_digest_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: