name: Daily Digest

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 09:00 Москва
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test FAS RSS (headers)
        run: |
          set -e
          curl -I -L --max-time 20 --connect-timeout 10 https://fas.gov.ru/rss/news.xml || true
      - name: Test FAS RSS (body sample)
        run: |
          set -e
          curl -L --max-time 20 --connect-timeout 10 -sS https://fas.gov.ru/rss/news.xml | head -c 1000 | sed -n '1,20p' || true          

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        run: python -m app.send_daily_digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}